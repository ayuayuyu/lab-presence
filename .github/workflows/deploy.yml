name: Deploy

on:
  push:
    branches: [master]

# 同時デプロイを防止する
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  ci:
    name: CI (tests must pass before deploy)
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Raspberry Pi
    needs: ci
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Restore .env from persistent location
        run: |
          ENV_SOURCE="${HOME}/.lab-presence.env"
          if [ ! -f "${ENV_SOURCE}" ]; then
            echo "::error::${ENV_SOURCE} が見つかりません。ラズパイで以下を実行してください:"
            echo "::error::  cp ~/lab-presence/.env ~/.lab-presence.env"
            exit 1
          fi
          cp "${ENV_SOURCE}" .env

      - name: Build and restart services
        run: |
          docker compose pull --ignore-buildable
          docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to become healthy..."
          for i in $(seq 1 30); do
            if docker compose ps | grep -E "(unhealthy|starting)" > /dev/null 2>&1; then
              echo "  attempt $i/30: services still starting..."
              sleep 5
            else
              echo "All services are up."
              break
            fi
          done

      - name: Verify deployment
        run: |
          docker compose ps
          echo ""
          echo "Health check..."
          curl -sf http://localhost/api/scan \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"macs":[]}' \
            && echo "Backend is responding." \
            || echo "::warning::Backend health check failed (may still be starting)"

      - name: Remove old Docker images
        run: docker image prune -f
